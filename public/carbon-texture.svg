<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="carbon" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#1a1a1a"/>
      <rect x="0" y="0" width="4" height="4" fill="#222"/>
      <rect x="4" y="4" width="4" height="4" fill="#222"/>
      <rect x="0" y="0" width="4" height="4" fill="url(#carbonGrad)"/>
      <rect x="4" y="4" width="4" height="4" fill="url(#carbonGrad)"/>
      <defs>
        <linearGradient id="carbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#2a2a2a"/>
          <stop offset="50%" stop-color="#1e1e1e"/>
          <stop offset="100%" stop-color="#2a2a2a"/>
        </linearGradient>
      </defs>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#carbon)"/>
  <rect width="200" height="200" fill="url(#carbon)" transform="rotate(90 100 100)"/>
</svg>